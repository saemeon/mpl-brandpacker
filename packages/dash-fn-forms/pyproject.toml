[project]
name = "dash-fn-forms"
dynamic = ["version"]
description = "Introspection-based UI engine for Plotly Dash — transform type-hinted Python functions into reactive Dash forms."
keywords = ["plotly", "dash", "visualization", "dashboard"]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
readme = "README.md"
license = "MIT"
authors = [
    { name = "Simon Niederberger", email = "s.niederberger@hotmail.com" },
]
maintainers = [
    { name = "Simon Niederberger", email = "s.niederberger@hotmail.com" },
]
requires-python = ">=3.10"
dependencies = [
    "annotated-types>=0.7.0",
    "dash>=4.0.0",
    "plotly>=6.6.0",
]

[project.urls]
Homepage = "https://github.com/saemeon/dash-interact"
Repository = "https://github.com/saemeon/dash-interact"

[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
write_to = "packages/dash-fn-forms/src/dash_fn_forms/_version.py"
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools.dynamic]
version = { attr = "dash_fn_forms._version.__version__" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dash_fn_forms = ["py.typed"]
