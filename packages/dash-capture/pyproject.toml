[project]
name = "dash-capture"
dynamic = ["version"]
description = "Browser capture & custom renderer pipeline for Plotly Dash components"
keywords = ["plotly", "dash", "capture", "export", "screenshot", "visualization"]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
readme = "README.md"
license = "MIT"
authors = [
    { name = "Simon Niederberger", email = "s.niederberger@hotmail.com" },
]
maintainers = [
    { name = "Simon Niederberger", email = "s.niederberger@hotmail.com" },
]
requires-python = ">=3.10"
dependencies = [
    "dash-fn-forms",
    "dash>=4.0.0",
    "matplotlib>=3.10.8",
    "plotly>=6.6.0",
]

[project.urls]
Homepage = "https://github.com/saemeon/dash-interact"
Repository = "https://github.com/saemeon/dash-interact"

[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
write_to = "packages/dash-capture/src/dash_capture/_version.py"
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools.dynamic]
version = { attr = "dash_capture._version.__version__" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dash_capture = ["py.typed", "assets/*.js"]
