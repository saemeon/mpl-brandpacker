[project]
name = "corpframe"
dynamic = ["version"]
description = "Corporate design frame for charts — wraps images with title, subtitle, footnotes, and sources using matplotlib"
keywords = ["matplotlib", "corporate", "design", "frame", "chart"]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
readme = "README.md"
license = "MIT"
authors = [
    { name = "Simon Niederberger", email = "s.niederberger@hotmail.com" },
]
requires-python = ">=3.10"
dependencies = [
    "matplotlib>=3.10.8",
]

[project.optional-dependencies]
dash = [
    "dash-capture",
    "dash>=4.0.0",
    "plotly>=6.6.0",
]

[project.scripts]
corpframe = "corpframe.cli:main"

[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
root = "../.."
write_to = "packages/corpframe/src/corpframe/_version.py"
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools.dynamic]
version = { attr = "corpframe._version.__version__" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
corpframe = ["py.typed"]
